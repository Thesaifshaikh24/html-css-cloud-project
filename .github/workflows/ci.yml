name: HTML CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Show Files
      run: ls -la

    - name: HTML Lint Check
      run: |
        sudo npm install -g htmlhint
        htmlhint .